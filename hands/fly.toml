app = "quipu-hands"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = false        # internal-only, no public IP needed
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  PORT = "8080"
  # SUPABASE_DB_URL    = set via fly secrets

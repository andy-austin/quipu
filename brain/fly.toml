app = "quipu-brain"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  PORT = "8000"
  # MCP_SERVER_URL      = set via fly secrets
  # GOOGLE_API_KEY      = set via fly secrets
  # SUPABASE_JWT_SECRET = set via fly secrets

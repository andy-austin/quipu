[tool.uv.workspace]
members = ["brain", "hands"]

[dependency-groups]
dev = [
    "ruff>=0.9",
    "pyright>=1.1",
    "pytest>=8",
    "pytest-asyncio>=0.25",
    "pytest-cov>=6.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "basic"
reportReturnType = false
reportAttributeAccessIssue = false
reportArgumentType = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
